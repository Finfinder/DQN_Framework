name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies (CPU CI subset)
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.5.1 numpy matplotlib tensorboard gymnasium
          pip install ruff==0.11.11

      - name: Lint for critical errors
        run: |
          ruff check . --select E9,F63,F7,F82

      - name: Compile all Python files
        run: |
          python -m compileall -q .

      - name: CLI smoke tests
        run: |
          python train.py --version
          python evaluate.py --version
          python play.py --version

      - name: Config and environment smoke test
        run: |
          python - <<'PY'
          from config.config import Config
          from utils.wrappers import make_env, wrap_env

          for env_name in sorted(Config.ENV_CONFIG.keys()):
              cfg = Config(env_name)
              assert cfg.model_path
              assert cfg.plot_path

          cfg = Config("CartPole-v1")
          env = make_env(cfg.env_name)
          env, _ = wrap_env(env, cfg)
          state, _ = env.reset(seed=cfg.seed)
          action = env.action_space.sample()
          env.step(action)
          env.close()
          print("Smoke checks passed")
          PY
